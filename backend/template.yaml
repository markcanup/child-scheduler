AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Child Scheduler backend services

Parameters:
  StageName:
    Type: String
    Default: prod
  ActionCatalogsTableName:
    Type: String
    Default: ActionCatalogs
  SchedulesTableName:
    Type: String
    Default: Schedules
  HubitatToken:
    Type: String
    NoEcho: true
    Default: change-me
  UiJwtStubToken:
    Type: String
    Default: dev-ui-token
  DefaultHubId:
    Type: String
    Default: default-hub
  AllowedOrigins:
    Type: String
    Default: http://localhost:3000
    Description: Comma-separated list of browser origins allowed for CORS requests.
  CognitoIssuerUrl:
    Type: String
    Default: ""
    Description: "Optional Cognito issuer URL for JWT auth (example: https://cognito-idp.us-east-1.amazonaws.com/us-east-1_ABC123)"
  CognitoAppClientId:
    Type: String
    Default: ""
    Description: Optional Cognito App Client ID (audience) for API Gateway JWT auth.

Conditions:
  UseCognitoAuthorizer: !And
    - !Not [!Equals [!Ref CognitoIssuerUrl, ""]]
    - !Not [!Equals [!Ref CognitoAppClientId, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        ACTION_CATALOGS_TABLE: !Ref ActionCatalogsTableName
        SCHEDULES_TABLE: !Ref SchedulesTableName
        HUBITAT_TOKEN: !Ref HubitatToken
        UI_JWT_STUB_TOKEN: !Ref UiJwtStubToken
        DEFAULT_HUB_ID: !Ref DefaultHubId

Resources:
  ChildSchedulerApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins: !Split [",", !Ref AllowedOrigins]
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - PUT
          - POST
          - OPTIONS
      Auth: !If
        - UseCognitoAuthorizer
        - Authorizers:
            CognitoJwtAuthorizer:
              IdentitySource: "$request.header.Authorization"
              JwtConfiguration:
                issuer: !Ref CognitoIssuerUrl
                audience:
                  - !Ref CognitoAppClientId
        - !Ref AWS::NoValue

  HubitatActionCatalogPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: functions/hubitat_action_catalog_post/handler.lambda_handler
      Description: POST /hubitat/action-catalog
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ActionCatalogsTableName
      Events:
        HubitatActionCatalogPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChildSchedulerApi
            Path: /hubitat/action-catalog
            Method: POST

  HubitatScheduleGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: functions/hubitat_schedule_get/handler.lambda_handler
      Description: GET /hubitat/schedule
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SchedulesTableName
      Events:
        HubitatScheduleGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChildSchedulerApi
            Path: /hubitat/schedule
            Method: GET

  CatalogGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: functions/catalog_get/handler.lambda_handler
      Description: GET /catalog
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ActionCatalogsTableName
      Events:
        CatalogGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChildSchedulerApi
            Path: /catalog
            Method: GET
            Auth:
              Authorizer: !If [UseCognitoAuthorizer, CognitoJwtAuthorizer, NONE]

  ScheduleConfigGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: functions/schedule_config_get/handler.lambda_handler
      Description: GET /schedule/config
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SchedulesTableName
      Events:
        ScheduleConfigGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChildSchedulerApi
            Path: /schedule/config
            Method: GET
            Auth:
              Authorizer: !If [UseCognitoAuthorizer, CognitoJwtAuthorizer, NONE]

  ScheduleConfigPutFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: functions/schedule_config_put/handler.lambda_handler
      Description: PUT /schedule/config
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SchedulesTableName
        - DynamoDBReadPolicy:
            TableName: !Ref ActionCatalogsTableName
      Events:
        ScheduleConfigPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref ChildSchedulerApi
            Path: /schedule/config
            Method: PUT
            Auth:
              Authorizer: !If [UseCognitoAuthorizer, CognitoJwtAuthorizer, NONE]

Outputs:
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub https://${ChildSchedulerApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/
